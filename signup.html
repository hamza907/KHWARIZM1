<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - خوارزم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-left">
        <div class="login-brand">
            <a href="index.html" class="brand">خوارزم</a>
        </div>
        <div class="login-visual">
            <h2>انضم إلينا الآن 👋</h2>
            <p>ابدأ رحلتك التعليمية مع أفضل منصة عربية</p>
        </div>
    </div>

    <div class="login-right">
        <div class="login-box">
            <h1>إنشاء حساب جديد</h1>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" required>
                <div class="form-group">
    <label>كلمة المرور</label>
    <div style="position:relative;">
        <input type="password" id="password" required>
        <span onclick="togglePassword('password')" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#666;">👁️</span>
    </div>
</div>

<div class="form-group">
    <label>تأكيد كلمة المرور</label>
    <div style="position:relative;">
        <input type="password" id="confirm-password" required>
        <span onclick="togglePassword('confirm-password')" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#666;">👁️</span>
    </div>
</div>
                <button type="submit" class="btn btn-gold full-width">إنشاء الحساب</button>
            </form>

            <p class="signup-link">
                لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
            </p>
        </div>
    </div>
</div>

<script>
// نظام تسجيل المستخدمين
// ملاحظة أمنية: التجزئة (hashing) هنا بتتم في المتصفح كإجراء مؤقت لتقليل خطورة
// تخزين الباسورد كنص صريح في localStorage. ده تحسين بسيط وليس بديلاً عن نظام
// مصادقة حقيقي من طرف السيرفر (bcrypt/argon2 + salt + جلسات JWT)، وهو مطلوب
// قبل إطلاق المنصة فعلياً لأن أي حد يقدر يفتح Developer Tools ويقرأ/يعدّل localStorage.
async function hashPassword(password) {
    const data = new TextEncoder().encode(password);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

// إيميلات محجوزة لا يُسمح بالتسجيل بها من الفورم العام (مثل حساب الأدمن).
// ملاحظة مهمة: ده تخفيف مؤقت فقط. الحماية الحقيقية للأدمن لازم تتم من السيرفر
// (دور/role مُتحقق منه في قاعدة بيانات، مش مجرد مطابقة إيميل في كود الفرونت-إند
// اللي أي حد يقدر يقرأه بـ View Source).
const RESERVED_EMAILS = ["admin@khwarizm.com"];

document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm-password").value;

    if (RESERVED_EMAILS.includes(email)) {
        alert("هذا البريد الإلكتروني غير متاح للتسجيل");
        return;
    }

    if (password !== confirm) {
        alert("كلمات المرور غير متطابقة");
        return;
    }
    if (password.length < 6) {
        alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");
        return;
    }

    // حفظ المستخدم (نظام محلي حالياً)
    const users = JSON.parse(localStorage.getItem("users")) || [];
    
    // التحقق من عدم وجود البريد مسبقاً
    if (users.find(u => u.email === email)) {
        alert("هذا البريد مسجل بالفعل!");
        return;
    }

    const passwordHash = await hashPassword(password);
    users.push({ name, email, passwordHash, role: "student", createdAt: new Date().toISOString() });
    localStorage.setItem("users", JSON.stringify(users));

    alert(`✅ تم إنشاء الحساب بنجاح!\nمرحباً ${name}`);
    
    // تسجيل دخول تلقائي
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);
    localStorage.setItem("isAdmin", "false");

    window.location.href = "dashboard.html";
});

// دالة إظهار / إخفاء كلمة المرور
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = field.parentElement.querySelector("span");
    
    if (field.type === "password") {
        field.type = "text";
        icon.textContent = "🙈";   // عين مغلقة
    } else {
        field.type = "password";
        icon.textContent = "👁️";   // عين مفتوحة
    }
}

</script>
</body>
</html>
