<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جلسة لايف - خوارزم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .live-container {
            max-width: 1200px;
            margin: 20px auto;
            background: #0f172a;
            color: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .live-header {
            background: #dc2626;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-badge {
            background: #fff;
            color: #dc2626;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        .video-area {
            height: 520px;
            background: #1e2937;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            position: relative;
        }
        .chat-box {
            width: 350px;
            background: #1e2937;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<!-- زر واتساب عائم -->
<a href="https://wa.me/+201205749083" 
   target="_blank"
   class="whatsapp-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" 
         alt="WhatsApp" width="28" height="28">
</a>

<style>
.whatsapp-float {
    position: fixed;
    bottom: 25px;
    left: 25px;           /* غيّر إلى right: 25px إذا كنت تفضل اليمين */
    background: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
    z-index: 1000;
    transition: all 0.3s ease;
}

.whatsapp-float:hover {
    transform: scale(1.15);
    box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
}

.whatsapp-float img {
    filter: brightness(0) invert(1);
}
</style>
<body>

<div class="live-container">
    <div class="live-header">
        <div>
            <h2>جلسة لايف: مقدمة في الذكاء الاصطناعي</h2>
            <p>مع المدرب: أحمد الخوارزمي • 47 طالب متصل</p>
        </div>
        <div class="live-badge">● LIVE</div>
    </div>

    <div style="display: flex;">
        <!-- منطقة الفيديو -->
        <div class="video-area" style="flex: 1;">
            <div style="text-align:center;">
                <div style="font-size: 80px; margin-bottom: 20px;">📹</div>
                <p>جاري البث المباشر...</p>
                <p style="color:#94a3b8;">(سيظهر هنا فيديو Zoom / Google Meet / LiveKit)</p>
            </div>
        </div>

        <!-- الشات -->
        <div class="chat-box">
            <div style="padding:15px; background:#1e2937; border-bottom:1px solid #334155;">
                <strong>الدردشة</strong>
            </div>
            <div id="chat-messages" style="height: 420px; overflow-y: auto; padding: 15px;"></div>
            
            <div style="padding:15px; border-top:1px solid #334155;">
                <input type="text" id="chat-input" placeholder="اكتب رسالتك..." 
                       style="width:100%; padding:12px; border-radius:12px; border:none;">
            </div>
        </div>
    </div>
</div>

<script>
// شات بسيط لايف
const chatMessages = document.getElementById("chat-messages");
const chatInput = document.getElementById("chat-input");

chatInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && this.value.trim() !== "") {
        const msg = document.createElement("div");
        msg.style.margin = "8px 0";
        msg.innerHTML = `<strong>أنت:</strong> ${this.value}`;
        chatMessages.appendChild(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        this.value = "";
    }
});


</script>

</body>
</html>
