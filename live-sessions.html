<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جلسة لايف - خوارزم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .live-container {
            max-width: 1200px;
            margin: 20px auto;
            background: #0f172a;
            color: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .live-header {
            background: #dc2626;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-badge {
            background: #fff;

            font-weight: bold;
            animation: pulse 2s infinite;
        }
        /* منطقة الفيديو الحقيقية (Daily.co) */

            height: 620px;
            background: #1e2937;
            position: relative;
        }
        #daily-container { width: 100%; height: 100%; }
        #daily-container iframe { width: 100%; height: 100%; border: 0; }

        .status-message {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            text-align: center; flex-direction: column; gap: 15px;
        }

        .whatsapp-float {
            position: fixed; bottom: 25px; left: 25px;
            background: #25D366; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); z-index: 1000;
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { transform: scale(1.15); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5); }
        .whatsapp-float img { filter: brightness(0) invert(1); }
    </style>
</head>
<body>

<a href="https://wa.me/+201205749083" target="_blank" rel="noopener noreferrer" class="whatsapp-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" width="28" height="28">
</a>

<div class="live-container">
    <div class="live-header">
        <div>
            <h2 id="session-title">جلسة لايف: مقدمة في الذكاء الاصطناعي</h2>
            <p>مع المدرب: أحمد الخوارزمي</p>
        </div>
        <div class="live-badge">● LIVE</div>
    </div>

    <div class="video-area">
        <!-- هنا هيتم تحميل غرفة الفيديو والشات الحقيقية من Daily.co -->
        <div id="daily-container"></div>

        <div id="status-message" class="status-message">
            <div style="font-size: 60px;">📹</div>
            <p>جاري الاتصال بغرفة الجلسة...</p>
        </div>
    </div>
</div>

<!-- مكتبة Daily.co للفيديو المباشر -->
<script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
<script>
/*
 * ================== إعداد الجلسة اللايف ==================
 * فيه طريقتين لتشغيل الغرفة:
 *
 * 1) طريقة سريعة (بدون باك-إند): اعمل حساب مجاني على https://dashboard.daily.co
 *    وأنشئ غرفة يدوياً من لوحة التحكم، وحط رابطها هنا مباشرة:
 *    const ROOM_URL = "https://YOUR-SUBDOMAIN.daily.co/your-room-name";
 *
 * 2) طريقة تلقائية (مع الباك-إند اللي هنبنيه): الصفحة تطلب من السيرفر
 *    إنشاء/جلب رابط غرفة جديدة لكل جلسة تلقائياً. ده اللي مفعّل تحت،
 *    وهيحتاج تشغيل السيرفر الموجود في مجلد backend/.
 */

const BACKEND_URL = "http://localhost:3001"; // غيّرها لعنوان السيرفر بعد النشر
const USE_BACKEND = true; // خليها false لو هتستخدم رابط غرفة ثابت بدل الباك-إند
const STATIC_ROOM_URL = "https://YOUR-SUBDOMAIN.daily.co/your-room-name";

async function getSessionRoomUrl() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session") || "ai-intro-demo";

    if (!USE_BACKEND) return STATIC_ROOM_URL;

    const userName = localStorage.getItem("userName") || "طالب";
    const response = await fetch(`${BACKEND_URL}/api/sessions/${encodeURIComponent(sessionId)}/join`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userName })
    });

    if (!response.ok) {
        throw new Error("تعذر إنشاء/جلب رابط الجلسة من السيرفر");
    }
    const data = await response.json();
    return data.roomUrl; // ممكن يحتوي على meeting token للدخول الآمن
}

async function startLiveSession() {
    const statusEl = document.getElementById("status-message");
    try {
        const roomUrl = await getSessionRoomUrl();
        statusEl.style.display = "none";

        const callFrame = window.DailyIframe.createFrame(
            document.getElementById("daily-container"),
            {
                showLeaveButton: true,
                iframeStyle: { width: "100%", height: "100%", border: "0" }
            }
        );
        await callFrame.join({ url: roomUrl });
    } catch (err) {
        console.error(err);
        statusEl.innerHTML = `
            <div style="font-size:60px;">⚠️</div>
            <p>تعذر الاتصال بالجلسة اللايف.</p>
            <p style="color:#94a3b8; font-size:0.9rem;">تأكد إن سيرفر الباك-إند شغّال، أو استخدم رابط غرفة ثابت مؤقتاً.</p>
        `;
    }
}

startLiveSession();
</script>

</body>
</html>
